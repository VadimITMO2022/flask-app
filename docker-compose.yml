services:
  flask_app:
    image: ${IMAGE_TAG}
    container_name: flask_app
    restart: always
    # Порт 5000 больше не нужно открывать наружу, 
    # Nginx достучится до него внутри сети Docker

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - flask_app
    restart: always
